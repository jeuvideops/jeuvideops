name: Sync Satellites

on:
  push:
    branches:
      - main
      - 'dev/**'
      - 'feature/**'
      - 'fix/**'

jobs:
  sync:
    name: Sync ${{ matrix.satellite.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        satellite:
          - name: SpaceInvaders
            repo: jeuvideops/SpaceInvaders
            path: SpaceInvaders
            deploy_key_secret: SI_DEPLOY_KEY

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: NxtLvLSoftware/git-subtree-action@1.1
        with:
          repo: ${{ matrix.satellite.repo }}
          path: ${{ matrix.satellite.path }}
          deploy_key: ${{ secrets[matrix.satellite.deploy_key_secret] }}
          branch: ${{ github.ref_name }}
          force: true
