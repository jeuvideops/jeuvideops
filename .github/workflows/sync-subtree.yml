name: Sync Satellites

on:
  push:
#    branches:
#      - main
#      - 'dev/**'
#      - 'feature/**'
#      - 'fix/**'

jobs:
  sync:
    name: Push subtrees to satellites
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add satellite remotes
        env:
          TOKEN: ${{ secrets.SATELLITE_TOKEN }}
        run: |
          git remote add satellite-si "https://${TOKEN}@github.com/jeuvideops/SpaceInvaders.git" || \
            git remote set-url satellite-si "https://${TOKEN}@github.com/jeuvideops/SpaceInvaders.git"
          git remote add satellite-ts "https://${TOKEN}@github.com/jeuvideops/TwoSpaceships.git" || \
            git remote set-url satellite-ts "https://${TOKEN}@github.com/jeuvideops/TwoSpaceships.git"

      - name: Sync SpaceInvaders
        run: git subtree push --prefix=SpaceInvaders satellite-si ${{ github.ref_name }}

      - name: Sync TwoSpaceships
        run: git subtree push --prefix=TwoSpaceships satellite-ts ${{ github.ref_name }}
