name: "[Core] PR Gate"

on:
  pull_request:
    branches: [main]
    paths:
      - 'SpaceInvaders/**'
      - 'TwoSpaceships/**'
      - '.github/**'

concurrency:
  group: pr-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  changes:
    name: Detect changed scopes
    runs-on: ubuntu-latest
    outputs:
      si: ${{ steps.filter.outputs.si }}
      ts: ${{ steps.filter.outputs.ts }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            si:
              - 'SpaceInvaders/**'
            ts:
              - 'TwoSpaceships/**'
            infra:
              - '.github/**'

  si-ci:
    name: Run SI CI
    needs: changes
    if: needs.changes.outputs.si == 'true' || needs.changes.outputs.infra == 'true'
    uses: ./.github/workflows/_ci-game.yml
    with:
      game-name: SpaceInvaders
      work-dir: SpaceInvaders
      artifact-prefix: spaceinvaders
    secrets: inherit

  ts-ci:
    name: Run TS CI
    needs: changes
    if: needs.changes.outputs.ts == 'true' || needs.changes.outputs.infra == 'true'
    uses: ./.github/workflows/_ci-game.yml
    with:
      game-name: TwoSpaceships
      work-dir: TwoSpaceships
      artifact-prefix: twospaceships
    secrets: inherit

  gate:
    name: PR Gate / Monorepo
    runs-on: ubuntu-latest
    if: always()
    needs: [changes, si-ci, ts-ci]
    steps:
      - name: Enforce required component checks
        run: |
          if [[ "${{ needs.changes.outputs.si }}" == "true" || "${{ needs.changes.outputs.infra }}" == "true" ]]; then
            [[ "${{ needs.si-ci.result }}" == "success" ]] || { echo "SpaceInvaders CI failed"; exit 1; }
          fi
          if [[ "${{ needs.changes.outputs.ts }}" == "true" || "${{ needs.changes.outputs.infra }}" == "true" ]]; then
            [[ "${{ needs.ts-ci.result }}" == "success" ]] || { echo "TwoSpaceships CI failed"; exit 1; }
          fi
