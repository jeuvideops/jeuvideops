name: "[Central] Tag Docker Image on Release"

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  tag-image:
    runs-on: ubuntu-latest
    steps:
      - name: Parse release tag
        id: parse
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          # Tag format: <component>-v<version>  e.g. spaceinvaders-v1.2.0
          if [[ ! "$TAG" =~ ^([a-z0-9-]+)-v([0-9]+\.[0-9]+\.[0-9]+(-[a-z0-9.]+)?)$ ]]; then
            echo "::error::Tag '$TAG' does not match expected format <component>-v<semver>"
            exit 1
          fi
          COMPONENT="${BASH_REMATCH[1]}"
          VERSION="${BASH_REMATCH[2]}"

          case "$COMPONENT" in
            spaceinvaders)
              DEPLOY_WORKFLOW="deploy-space-invaders.yml"
              STATIC_ARTIFACT="si-site"
              ;;
            twospaceships)
              DEPLOY_WORKFLOW="deploy-two-spaceships.yml"
              STATIC_ARTIFACT="ts-site"
              ;;
            *)
              echo "::error::Unsupported component '$COMPONENT'"
              exit 1
              ;;
          esac

          echo "component=${COMPONENT}" >> "$GITHUB_OUTPUT"
          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "deploy_workflow=${DEPLOY_WORKFLOW}" >> "$GITHUB_OUTPUT"
          echo "static_artifact=${STATIC_ARTIFACT}" >> "$GITHUB_OUTPUT"

      - uses: imjasonh/setup-crane@v0.4

      - name: Login crane to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login ghcr.io \
            -u "${{ github.actor }}" --password-stdin

      - name: Login crane to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | crane auth login docker.io \
            -u "${{ vars.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Resolve digest of :latest
        id: digest
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/${{ steps.parse.outputs.component }}
        run: |
          DIGEST=$(crane digest "${IMAGE}:latest")
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Tag GHCR image with semver
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/${{ steps.parse.outputs.component }}
          DIGEST: ${{ steps.digest.outputs.digest }}
          VERSION: ${{ steps.parse.outputs.version }}
        run: |
          crane tag "${IMAGE}@${DIGEST}" "${VERSION}"

      - name: Copy image to Docker Hub with semver tag
        env:
          SRC: ghcr.io/${{ github.repository_owner }}/${{ steps.parse.outputs.component }}
          DST: docker.io/${{ vars.DOCKERHUB_USERNAME }}/${{ steps.parse.outputs.component }}
          DIGEST: ${{ steps.digest.outputs.digest }}
          VERSION: ${{ steps.parse.outputs.version }}
        run: |
          crane copy "${SRC}@${DIGEST}" "${DST}:${VERSION}"

      - name: Download static build artifact
        uses: dawidd6/action-download-artifact@v20
        with:
          github_token: ${{ github.token }}
          workflow: ${{ steps.parse.outputs.deploy_workflow }}
          workflow_conclusion: success
          branch: main
          name: ${{ steps.parse.outputs.static_artifact }}
          path: release-assets/site

      - name: Package release static build
        id: static-package
        env:
          COMPONENT: ${{ steps.parse.outputs.component }}
          VERSION: ${{ steps.parse.outputs.version }}
        run: |
          ARCHIVE_NAME="${COMPONENT}-${VERSION}-static-site.zip"
          (cd release-assets && zip -r "${ARCHIVE_NAME}" site)
          echo "archive=release-assets/${ARCHIVE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Attach release note about image tags
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          append_body: true
          files: ${{ steps.static-package.outputs.archive }}
          body: |

            ---
            ### Docker images

            - `ghcr.io/${{ github.repository_owner }}/${{ steps.parse.outputs.component }}:${{ steps.parse.outputs.version }}`
            - `docker.io/${{ vars.DOCKERHUB_USERNAME }}/${{ steps.parse.outputs.component }}:${{ steps.parse.outputs.version }}`

            Digest: `${{ steps.digest.outputs.digest }}`
