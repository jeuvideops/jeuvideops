name: "[SI] CD"

on:
  push:
    branches: [main]
    paths:
      - 'SpaceInvaders/**'
      - '!SpaceInvaders/.out/**'

concurrency:
  group: cd-spaceinvaders
  cancel-in-progress: false

jobs:
  cd:
    name: "CD Suite"
    uses: ./.github/workflows/_cd-game.yml
    with:
      game-name: SpaceInvaders
      work-dir: SpaceInvaders
      artifact-prefix: spaceinvaders
      build-cmd: npm run build
      build-output-dir: SpaceInvaders/build
      docker-image-name: spaceinvaders
    secrets: inherit
