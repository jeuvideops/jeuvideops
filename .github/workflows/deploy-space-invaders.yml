name: "[SI] Build & Deploy"

on:
  push:
    branches: [main]
    paths:
      - 'SpaceInvaders/**'
      - '.github/workflows/deploy-space-invaders.yml'
      - '.github/workflows/_deploy-game.yml'
      - '.github/workflows/_ci-game.yml'
      - '.github/actions/**'
  workflow_dispatch:

concurrency:
  group: deploy-space-invaders
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  pull-requests: write

jobs:
  deploy:
    uses: ./.github/workflows/_deploy-game.yml
    with:
      game-name: SpaceInvaders
      work-dir: SpaceInvaders
      artifact-prefix: spaceinvaders
      image-name: spaceinvaders
      build-cmd: npm run build
      build-output-dir: SpaceInvaders/build
      static-artifact-name: si-site
    secrets: inherit
