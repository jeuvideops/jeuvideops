name: deploy-space-invaders

on:
  push:
    branches: [main]
    paths:
      - 'SpaceInvaders/**'
      - '.github/workflows/deploy-space-invaders.yml'
      - '.github/pages/**'
      - '.github/actions/setup-node-project/**'
  workflow_dispatch:

concurrency:
  group: deploy-space-invaders
  cancel-in-progress: false

permissions:
  contents: read

env:
  WORK_DIR: SpaceInvaders

jobs:
  # ─── Stage 1: CI ────────────────────────────────────────────────────────────

  ci:
    name: CI
    uses: ./.github/workflows/ci-space-invaders.yml
    secrets: inherit

  # ─── Stage 2: Build ─────────────────────────────────────────────────────────

  build:
    name: Build Static Site
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-project
        with:
          working-directory: ${{ env.WORK_DIR }}

      - name: Build game
        working-directory: ${{ env.WORK_DIR }}
        run: npm run build

      - name: Upload static artifact
        uses: actions/upload-artifact@v4
        with:
          name: si-site
          path: ${{ env.WORK_DIR }}/build/
          retention-days: 7

  # ─── Stage 3: Registry ──────────────────────────────────────────────────────

  docker-ghcr:
    name: Build & Push GHCR
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/spaceinvaders
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_RECORD_UPLOAD: "false"
        with:
          context: ${{ env.WORK_DIR }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Stage 4: Deploy ────────────────────────────────────────────────────────

  deploy-pages:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: [build, docker-ghcr]
    if: always() && needs.build.result == 'success'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      # ── Game ──────────────────────────────────────────────────────────────
      - name: Download static site
        uses: actions/download-artifact@v4
        with:
          name: si-site
          path: .artifacts/site

      # ── Reports (from CI stage) ───────────────────────────────────────────
      - name: Download Allure report
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: spaceinvaders-allure-tests-report
          path: .artifacts/allure-report
        continue-on-error: true

      - name: Download Playwright report
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: spaceinvaders-playwright-report
          path: .artifacts/playwright-report
        continue-on-error: true

      - name: Download Coverage report
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: spaceinvaders-coverage
          path: .artifacts/coverage
        continue-on-error: true

      - name: Download Audit report
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: spaceinvaders-npm-audit-report
          path: .artifacts/audit
        continue-on-error: true

      # ── Assemble site ─────────────────────────────────────────────────────
      - name: Assemble central site
        run: |
          set -euo pipefail
          mkdir -p site

          cp ".github/pages/index.html" "site/index.html"

          if [ -d ".artifacts/site" ]; then
            mkdir -p "site/SpaceInvaders"
            cp -R ".artifacts/site/." "site/SpaceInvaders/"
          else
            echo "::warning::SpaceInvaders site artifact not found."
          fi

          if [ -d ".artifacts/allure-report" ]; then
            mkdir -p "site/SpaceInvaders/allure-report"
            cp -R ".artifacts/allure-report/." "site/SpaceInvaders/allure-report/"
          fi

          if [ -d ".artifacts/playwright-report" ]; then
            mkdir -p "site/SpaceInvaders/playwright-report"
            cp -R ".artifacts/playwright-report/." "site/SpaceInvaders/playwright-report/"
          fi

          if [ -d ".artifacts/coverage" ]; then
            mkdir -p "site/SpaceInvaders/coverage"
            cp -R ".artifacts/coverage/." "site/SpaceInvaders/coverage/"
          fi

          if [ -f ".artifacts/audit/audit-report.html" ]; then
            cp ".artifacts/audit/audit-report.html" "site/SpaceInvaders/audit-report.html"
          fi

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
