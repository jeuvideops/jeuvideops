name: deploy-space-invaders

on:
  push:
    branches: [main]
    paths:
      - 'SpaceInvaders/**'
      - '.github/workflows/deploy-space-invaders.yml'
      - '.github/pages/**'
      - '.github/actions/setup-node-project/**'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  packages: write
  pages: write
  id-token: write

env:
  WORK_DIR: SpaceInvaders

jobs:
  build-spaceinvaders:
    name: Build SpaceInvaders Artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-project
        with:
          working-directory: ${{ env.WORK_DIR }}

      - name: Build game
        working-directory: ${{ env.WORK_DIR }}
        run: npm run build

      - name: Upload static artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-spaceinvaders
          path: ${{ env.WORK_DIR }}/build/
          retention-days: 7

  # ─── Run CI jobs to produce fresh reports ───────────────────────────────────

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-project
        with:
          working-directory: ${{ env.WORK_DIR }}

      - name: Run ESLint
        working-directory: ${{ env.WORK_DIR }}
        run: npm run lint:gha

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-project
        with:
          working-directory: ${{ env.WORK_DIR }}

      - name: Run Unit Tests
        id: unit-tests
        working-directory: ${{ env.WORK_DIR }}
        run: npm run test:unit
        continue-on-error: true

      - name: Upload Allure results (unit)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-si-allure-results-unit
          path: ${{ env.WORK_DIR }}/.out/allure-results/
          retention-days: 7

      - name: Upload Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-si-coverage
          path: ${{ env.WORK_DIR }}/.out/coverage/
          retention-days: 7

      - name: Fail job if unit tests failed
        if: steps.unit-tests.outcome == 'failure'
        run: exit 1

  e2e-test:
    name: E2E Tests
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-jammy
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - name: Install build dependencies
        run: apt-get update && apt-get install -y build-essential

      - uses: ./.github/actions/setup-node-project
        with:
          working-directory: ${{ env.WORK_DIR }}

      - name: Run E2E Tests
        id: e2e-tests
        working-directory: ${{ env.WORK_DIR }}
        run: npm run test:e2e
        continue-on-error: true

      - name: Upload Allure results (e2e)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-si-allure-results-e2e
          path: ${{ env.WORK_DIR }}/.out/allure-results/
          retention-days: 7

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-si-playwright-report
          path: ${{ env.WORK_DIR }}/.out/e2e-report/
          retention-days: 7

      - name: Fail job if E2E tests failed
        if: steps.e2e-tests.outcome == 'failure'
        run: exit 1

  generate-allure-report:
    name: Allure - E2E & Unit Report
    runs-on: ubuntu-latest
    needs: [unit-test, e2e-test]
    if: always()
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-project
        with:
          working-directory: ${{ env.WORK_DIR }}

      - name: Download Allure Results
        uses: actions/download-artifact@v4
        with:
          pattern: deploy-si-allure-results-*
          path: ${{ env.WORK_DIR }}/.out/allure-results/
          merge-multiple: true

      - name: Generate Allure Report
        working-directory: ${{ env.WORK_DIR }}
        run: npm run reports

      - name: Upload Allure Tests Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-si-allure-report
          path: ${{ env.WORK_DIR }}/.out/allure-report/
          retention-days: 7

  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-project
        with:
          working-directory: ${{ env.WORK_DIR }}

      - name: Run npm audit & summary
        id: audit
        continue-on-error: true
        uses: ./.github/actions/npm-audit-summary

      - name: Generate HTML report
        if: always()
        working-directory: ${{ env.WORK_DIR }}
        run: npm audit --omit=dev --json | npx audit-export

      - name: Upload Audit HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-si-audit-report
          path: ${{ env.WORK_DIR }}/audit-report.html
          retention-days: 7

  # ─── Assemble & deploy central GitHub Pages ─────────────────────────────────

  deploy-pages-central:
    name: Deploy Central GitHub Pages
    runs-on: ubuntu-latest
    needs:
      - build-spaceinvaders
      - generate-allure-report
      - e2e-test
      - unit-test
      - audit
    if: always() && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      # ── Game ──────────────────────────────────────────────────────────────
      - name: Download SpaceInvaders site artifact
        uses: actions/download-artifact@v4
        with:
          name: site-spaceinvaders
          path: .artifacts/site-spaceinvaders

      # ── Reports ───────────────────────────────────────────────────────────
      - name: Download Allure report
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: deploy-si-allure-report
          path: .artifacts/allure-report
        continue-on-error: true

      - name: Download Playwright report
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: deploy-si-playwright-report
          path: .artifacts/playwright-report
        continue-on-error: true

      - name: Download Coverage report
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: deploy-si-coverage
          path: .artifacts/coverage
        continue-on-error: true

      - name: Download Audit report
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: deploy-si-audit-report
          path: .artifacts/audit
        continue-on-error: true

      # ── Assemble site ─────────────────────────────────────────────────────
      - name: Assemble central site
        run: |
          set -euo pipefail
          mkdir -p site

          # Dashboard index
          cp ".github/pages/index.html" "site/index.html"

          # Game
          if [ -d ".artifacts/site-spaceinvaders" ]; then
            mkdir -p "site/SpaceInvaders"
            cp -R ".artifacts/site-spaceinvaders/." "site/SpaceInvaders/"
          else
            echo "::warning::SpaceInvaders site artifact not found."
          fi

          # Allure report
          if [ -d ".artifacts/allure-report" ]; then
            mkdir -p "site/SpaceInvaders/allure-report"
            cp -R ".artifacts/allure-report/." "site/SpaceInvaders/allure-report/"
          fi

          # Playwright report
          if [ -d ".artifacts/playwright-report" ]; then
            mkdir -p "site/SpaceInvaders/playwright-report"
            cp -R ".artifacts/playwright-report/." "site/SpaceInvaders/playwright-report/"
          fi

          # Coverage report
          if [ -d ".artifacts/coverage" ]; then
            mkdir -p "site/SpaceInvaders/coverage"
            cp -R ".artifacts/coverage/." "site/SpaceInvaders/coverage/"
          fi

          # Audit HTML report
          if [ -f ".artifacts/audit/audit-report.html" ]; then
            cp ".artifacts/audit/audit-report.html" "site/SpaceInvaders/audit-report.html"
          fi

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
