name: _Deploy (reusable)

on:
  workflow_call:
    inputs:
      game-name:
        required: true
        type: string
      work-dir:
        required: true
        type: string
      artifact-prefix:
        required: true
        type: string
      image-name:
        description: Short image name, e.g. "spaceinvaders"
        required: true
        type: string
      build-cmd:
        description: Build command run in work-dir
        required: false
        type: string
        default: npm run build
      build-output-dir:
        description: Relative path (from repo root) of the static build output
        required: true
        type: string
      static-artifact-name:
        description: Name of the static site artifact (e.g. "si-site")
        required: true
        type: string

permissions:
  contents: read
  packages: write
  pull-requests: write

jobs:
  ci:
    name: "CI Suite"
    uses: ./.github/workflows/_ci-game.yml
    with:
      game-name: ${{ inputs.game-name }}
      work-dir: ${{ inputs.work-dir }}
      artifact-prefix: ${{ inputs.artifact-prefix }}
    secrets: inherit

  build-static:
    name: "Build: Static Artifact"
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-project
        with:
          working-directory: ${{ inputs.work-dir }}
      - name: Build game
        working-directory: ${{ inputs.work-dir }}
        run: ${{ inputs.build-cmd }}
      - name: Upload static artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.static-artifact-name }}
          path: ${{ inputs.build-output-dir }}
          retention-days: 7

  build-docker:
    name: "Build: Docker Image"
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
      image: ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}
    steps:
      - uses: actions/checkout@v6
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=staging-${{ github.sha }}
      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Build and push (once)
        id: push
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_RECORD_UPLOAD: "false"
        with:
          context: ${{ inputs.work-dir }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  promote-ghcr:
    name: "Deploy: Production (GHCR)"
    runs-on: ubuntu-latest
    needs: build-docker
    permissions:
      contents: read
      packages: write
    environment:
      name: production
      url: https://ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}
    steps:
      - uses: imjasonh/setup-crane@v0.4
      - name: Login crane to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login ghcr.io \
            -u "${{ github.actor }}" --password-stdin
      - name: Retag :latest to point at the new digest
        env:
          IMAGE: ${{ needs.build-docker.outputs.image }}
          DIGEST: ${{ needs.build-docker.outputs.digest }}
        run: |
          crane tag "${IMAGE}@${DIGEST}" latest

  promote-dockerhub:
    name: "Deploy: Production (Docker Hub)"
    runs-on: ubuntu-latest
    needs: build-docker
    environment:
      name: production
      url: https://hub.docker.com/r/${{ vars.DOCKERHUB_USERNAME }}/${{ inputs.image-name }}
    steps:
      - uses: imjasonh/setup-crane@v0.4
      - name: Login crane to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login ghcr.io \
            -u "${{ github.actor }}" --password-stdin
      - name: Login crane to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | crane auth login docker.io \
            -u "${{ vars.DOCKERHUB_USERNAME }}" --password-stdin
      - name: Copy image to Docker Hub with :latest
        env:
          SRC: ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}
          DST: docker.io/${{ vars.DOCKERHUB_USERNAME }}/${{ inputs.image-name }}
          DIGEST: ${{ needs.build-docker.outputs.digest }}
        run: |
          crane copy "${SRC}@${DIGEST}" "${DST}:latest"
      - name: Also publish :sha-<short>
        env:
          SRC: ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}
          DST: docker.io/${{ vars.DOCKERHUB_USERNAME }}/${{ inputs.image-name }}
          DIGEST: ${{ needs.build-docker.outputs.digest }}
          SHA: ${{ github.sha }}
        run: |
          SHORT_SHA="${SHA:0:7}"
          crane copy "${SRC}@${DIGEST}" "${DST}:sha-${SHORT_SHA}"
