name: Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - 'TwoSpaceships'
      - 'TwoSpaceships/**'
      - '.gitmodules'
      - '.github/workflows/deploy-two-spaceships.yml'
      - '.github/pages/**'
      - '.github/actions/setup-node-project/**'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  packages: write
  pages: write
  id-token: write

env:
  WORK_DIR: TwoSpaceships

jobs:
  build-twospaceships:
    name: Build TwoSpaceships Artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-project
        with:
          working-directory: ${{ env.WORK_DIR }}

      - name: Build game
        working-directory: ${{ env.WORK_DIR }}
        run: npx gulp build

      - name: Upload static artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-twospaceships
          path: ${{ env.WORK_DIR }}/dist/min/
          retention-days: 7

  # ─── Run CI jobs to produce fresh reports ───────────────────────────────────

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-project
        with:
          working-directory: ${{ env.WORK_DIR }}

      - name: Run ESLint
        working-directory: ${{ env.WORK_DIR }}
        run: npm run lint:gha

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-project
        with:
          working-directory: ${{ env.WORK_DIR }}

      - name: Run Unit Tests
        id: unit-tests
        working-directory: ${{ env.WORK_DIR }}
        run: npm run test:unit
        continue-on-error: true

      - name: Upload Allure results (unit)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-ts-allure-results-unit
          path: ${{ env.WORK_DIR }}/.out/allure-results/
          retention-days: 7

      - name: Upload Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-ts-coverage
          path: ${{ env.WORK_DIR }}/.out/coverage/
          retention-days: 7

      - name: Fail job if unit tests failed
        if: steps.unit-tests.outcome == 'failure'
        run: exit 1

  e2e-test:
    name: E2E Tests
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-jammy
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-project
        with:
          working-directory: ${{ env.WORK_DIR }}

      - name: Run E2E Tests
        id: e2e-tests
        working-directory: ${{ env.WORK_DIR }}
        run: npm run test:e2e
        continue-on-error: true

      - name: Upload Allure results (e2e)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-ts-allure-results-e2e
          path: ${{ env.WORK_DIR }}/.out/allure-results/
          retention-days: 7

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-ts-playwright-report
          path: ${{ env.WORK_DIR }}/.out/e2e-report/
          retention-days: 7

      - name: Fail job if E2E tests failed
        if: steps.e2e-tests.outcome == 'failure'
        run: exit 1

  generate-allure-report:
    name: Allure - E2E & Unit Report
    runs-on: ubuntu-latest
    needs: [unit-test, e2e-test]
    if: always()
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-project
        with:
          working-directory: ${{ env.WORK_DIR }}

      - name: Download Allure Results
        uses: actions/download-artifact@v4
        with:
          pattern: deploy-ts-allure-results-*
          path: ${{ env.WORK_DIR }}/.out/allure-results/
          merge-multiple: true

      - name: Generate Allure Report
        working-directory: ${{ env.WORK_DIR }}
        run: npm run reports

      - name: Upload Allure Tests Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-ts-allure-report
          path: ${{ env.WORK_DIR }}/.out/allure-report/
          retention-days: 7

  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-project
        with:
          working-directory: ${{ env.WORK_DIR }}

      - name: Run npm audit & summary
        id: audit
        continue-on-error: true
        uses: ./.github/actions/npm-audit-summary

      - name: Generate HTML report
        if: always()
        working-directory: ${{ env.WORK_DIR }}
        run: npm audit --omit=dev --json | npx audit-export

      - name: Upload Audit HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-ts-audit-report
          path: ${{ env.WORK_DIR }}/audit-report.html
          retention-days: 7

  docker-ghcr:
    name: Build & Push to ghcr.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/twospaceships
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_RECORD_UPLOAD: "false"
        with:
          context: ${{ env.WORK_DIR }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-hub:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ vars.DOCKERHUB_USERNAME }}/twospaceships
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_RECORD_UPLOAD: "false"
        with:
          context: ${{ env.WORK_DIR }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Assemble & deploy central GitHub Pages ─────────────────────────────────

  deploy-pages-central:
    name: Deploy Central GitHub Pages
    runs-on: ubuntu-latest
    needs:
      - build-twospaceships
      - generate-allure-report
      - e2e-test
      - unit-test
      - audit
    if: always() && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      # ── Game ──────────────────────────────────────────────────────────────
      - name: Download TwoSpaceships site artifact
        uses: actions/download-artifact@v4
        with:
          name: site-twospaceships
          path: .artifacts/site-twospaceships

      # ── Reports ───────────────────────────────────────────────────────────
      - name: Download Allure report
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: deploy-ts-allure-report
          path: .artifacts/allure-report
        continue-on-error: true

      - name: Download Playwright report
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: deploy-ts-playwright-report
          path: .artifacts/playwright-report
        continue-on-error: true

      - name: Download Coverage report
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: deploy-ts-coverage
          path: .artifacts/coverage
        continue-on-error: true

      - name: Download Audit report
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: deploy-ts-audit-report
          path: .artifacts/audit
        continue-on-error: true

      # ── Assemble site ─────────────────────────────────────────────────────
      - name: Assemble central site
        run: |
          set -euo pipefail
          mkdir -p site

          # Dashboard index
          cp ".github/pages/index.html" "site/index.html"

          # Game
          if [ ! -d ".artifacts/site-twospaceships" ]; then
            echo "::error::No TwoSpaceships artifact found to publish."
            exit 1
          fi
          mkdir -p "site/TwoSpaceships"
          cp -R ".artifacts/site-twospaceships/." "site/TwoSpaceships/"

          # Allure report
          if [ -d ".artifacts/allure-report" ]; then
            mkdir -p "site/TwoSpaceships/allure-report"
            cp -R ".artifacts/allure-report/." "site/TwoSpaceships/allure-report/"
          fi

          # Playwright report
          if [ -d ".artifacts/playwright-report" ]; then
            mkdir -p "site/TwoSpaceships/playwright-report"
            cp -R ".artifacts/playwright-report/." "site/TwoSpaceships/playwright-report/"
          fi

          # Coverage report
          if [ -d ".artifacts/coverage" ]; then
            mkdir -p "site/TwoSpaceships/coverage"
            cp -R ".artifacts/coverage/." "site/TwoSpaceships/coverage/"
          fi

          # Audit HTML report
          if [ -f ".artifacts/audit/audit-report.html" ]; then
            cp ".artifacts/audit/audit-report.html" "site/TwoSpaceships/audit-report.html"
          fi

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
