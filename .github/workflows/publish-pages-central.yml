name: "[Central] Publish Pages"

on:
  workflow_run:
    workflows: ["[SI] Build & Deploy", "[TS] Build & Deploy"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/pages/**'
      - '.github/workflows/publish-pages-central.yml'

concurrency:
  group: publish-pages-central
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

jobs:
  deploy-pages:
    name: "Deploy: GitHub Pages"
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Download SI static site
        uses: dawidd6/action-download-artifact@v20
        with:
          github_token: ${{ github.token }}
          workflow: deploy-space-invaders.yml
          workflow_conclusion: success
          branch: main
          name: si-site
          path: site/SpaceInvaders
          if_no_artifact_found: warn

      - name: Download TS static site
        uses: dawidd6/action-download-artifact@v20
        with:
          github_token: ${{ github.token }}
          workflow: deploy-two-spaceships.yml
          workflow_conclusion: success
          branch: main
          name: ts-site
          path: site/TwoSpaceships
          if_no_artifact_found: warn

      - name: Download SI Allure report (latest successful deploy)
        uses: dawidd6/action-download-artifact@v20
        with:
          github_token: ${{ github.token }}
          workflow: deploy-space-invaders.yml
          workflow_conclusion: success
          branch: main
          name: spaceinvaders-allure-tests-report
          path: site/SpaceInvaders/allure-report
          if_no_artifact_found: warn

      - name: Download SI Playwright report (latest successful deploy)
        uses: dawidd6/action-download-artifact@v20
        with:
          github_token: ${{ github.token }}
          workflow: deploy-space-invaders.yml
          workflow_conclusion: success
          branch: main
          name: spaceinvaders-playwright-report
          path: site/SpaceInvaders/playwright-report
          if_no_artifact_found: warn

      - name: Download SI coverage (latest successful deploy)
        uses: dawidd6/action-download-artifact@v20
        with:
          github_token: ${{ github.token }}
          workflow: deploy-space-invaders.yml
          workflow_conclusion: success
          branch: main
          name: spaceinvaders-coverage
          path: site/SpaceInvaders/coverage
          if_no_artifact_found: warn

      - name: Download SI npm audit report (latest successful deploy)
        uses: dawidd6/action-download-artifact@v20
        with:
          github_token: ${{ github.token }}
          workflow: deploy-space-invaders.yml
          workflow_conclusion: success
          branch: main
          name: spaceinvaders-npm-audit-report
          path: site/SpaceInvaders
          if_no_artifact_found: warn

      - name: Download TS Allure report (latest successful deploy)
        uses: dawidd6/action-download-artifact@v20
        with:
          github_token: ${{ github.token }}
          workflow: deploy-two-spaceships.yml
          workflow_conclusion: success
          branch: main
          name: twospaceships-allure-tests-report
          path: site/TwoSpaceships/allure-report
          if_no_artifact_found: warn

      - name: Download TS Playwright report (latest successful deploy)
        uses: dawidd6/action-download-artifact@v20
        with:
          github_token: ${{ github.token }}
          workflow: deploy-two-spaceships.yml
          workflow_conclusion: success
          branch: main
          name: twospaceships-playwright-report
          path: site/TwoSpaceships/playwright-report
          if_no_artifact_found: warn

      - name: Download TS coverage (latest successful deploy)
        uses: dawidd6/action-download-artifact@v20
        with:
          github_token: ${{ github.token }}
          workflow: deploy-two-spaceships.yml
          workflow_conclusion: success
          branch: main
          name: twospaceships-coverage
          path: site/TwoSpaceships/coverage
          if_no_artifact_found: warn

      - name: Download TS npm audit report (latest successful deploy)
        uses: dawidd6/action-download-artifact@v20
        with:
          github_token: ${{ github.token }}
          workflow: deploy-two-spaceships.yml
          workflow_conclusion: success
          branch: main
          name: twospaceships-npm-audit-report
          path: site/TwoSpaceships
          if_no_artifact_found: warn

      - name: Copy central dashboard index
        run: cp ".github/pages/index.html" "site/index.html"

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
