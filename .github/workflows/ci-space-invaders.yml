name: ci-space-invaders

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches-ignore: [main]
    paths:
      - 'SpaceInvaders/**'
      - '.github/workflows/ci-space-invaders.yml'
      - '.github/actions/**'
  pull_request:
    branches: [main]
    paths:
      - 'SpaceInvaders/**'
      - '.github/workflows/ci-space-invaders.yml'
      - '.github/actions/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  WORK_DIR: SpaceInvaders

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-project
        with:
          working-directory: ${{ env.WORK_DIR }}

      - name: Run ESLint
        working-directory: ${{ env.WORK_DIR }}
        run: npm run lint:gha

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-project
        with:
          working-directory: ${{ env.WORK_DIR }}

      - name: Run Unit Tests
        id: unit-tests
        working-directory: ${{ env.WORK_DIR }}
        run: npm run test:unit
        continue-on-error: true

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spaceinvaders-allure-results-unit
          path: ${{ env.WORK_DIR }}/.out/allure-results/
          retention-days: 14

      - name: Upload Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spaceinvaders-coverage
          path: ${{ env.WORK_DIR }}/.out/coverage/
          retention-days: 7

      - name: Vitest Coverage Report
        if: always() && github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          working-directory: ${{ env.WORK_DIR }}
          json-summary-path: .out/coverage/coverage-summary.json
          json-final-path: .out/coverage/coverage-final.json
          threshold-icons: '{"0": "🔴", "80": "🟠", "90": "🟢"}'
          file-coverage-mode: all

      - name: Fail job if unit tests failed
        if: steps.unit-tests.outcome == 'failure'
        run: exit 1

  e2e-test:
    name: E2E Tests
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-jammy
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - name: Install build dependencies
        run: apt-get update && apt-get install -y build-essential

      - uses: ./.github/actions/setup-node-project
        with:
          working-directory: ${{ env.WORK_DIR }}

      - name: Run E2E Tests
        id: e2e-tests
        working-directory: ${{ env.WORK_DIR }}
        run: npm run test:e2e
        continue-on-error: true

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spaceinvaders-allure-results-e2e
          path: ${{ env.WORK_DIR }}/.out/allure-results/
          retention-days: 14

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spaceinvaders-playwright-report
          path: ${{ env.WORK_DIR }}/.out/e2e-report/
          retention-days: 7

      - name: Upload Playwright traces & videos
        if: steps.e2e-tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: spaceinvaders-playwright-artifacts
          path: ${{ env.WORK_DIR }}/.out/playwright-test-results/
          retention-days: 7

      - name: Fail job if E2E tests failed
        if: steps.e2e-tests.outcome == 'failure'
        run: exit 1

  generate-test-report:
    name: Allure - E2E & Unit Report
    runs-on: ubuntu-latest
    needs: [unit-test, e2e-test]
    if: always()
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-project
        with:
          working-directory: ${{ env.WORK_DIR }}

      - name: Download Results
        uses: actions/download-artifact@v4
        with:
          pattern: spaceinvaders-allure-results-*
          path: ${{ env.WORK_DIR }}/.out/allure-results/
          merge-multiple: true

      - name: Generate Allure Report
        working-directory: ${{ env.WORK_DIR }}
        run: npm run reports

      - name: Upload Allure Tests Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spaceinvaders-allure-tests-report
          path: ${{ env.WORK_DIR }}/.out/allure-report/
          retention-days: 7

  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-project
        with:
          working-directory: ${{ env.WORK_DIR }}

      - name: Run npm audit & summary
        id: audit
        continue-on-error: true
        uses: ./.github/actions/npm-audit-summary

      - name: Generate HTML report
        if: always()
        working-directory: ${{ env.WORK_DIR }}
        run: npm audit --omit=dev --json | npx audit-export

      - name: Upload Audit HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spaceinvaders-npm-audit-report
          path: ${{ env.WORK_DIR }}/audit-report.html
          retention-days: 7

      - name: Fail job if audit failed
        if: steps.audit.outcome == 'failure'
        run: exit 1

  PR-report:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: [lint, unit-test, e2e-test, audit]
    if: always() && github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: ci-space-invaders
          recreate: true
          message: |
            ## CI Report — SpaceInvaders

            | Job | Status |
            |-----|--------|
            | Lint | ${{ needs.lint.result == 'success' && '✅ Passed' || '❌ Failed' }} |
            | Unit Tests | ${{ needs.unit-test.result == 'success' && '✅ Passed' || '❌ Failed' }} |
            | E2E Tests | ${{ needs.e2e-test.result == 'success' && '✅ Passed' || '❌ Failed' }} |
            | npm audit | ${{ needs.audit.result == 'success' && '✅ Clean' || '⚠️ Issues' }} |

            [View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
