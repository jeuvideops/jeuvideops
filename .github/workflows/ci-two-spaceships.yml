name: ci-two-spaceships

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  WORK_DIR: TwoSpaceships

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/setup-node-project
        with:
          working-directory: ${{ env.WORK_DIR }}

      - name: Run ESLint
        working-directory: ${{ env.WORK_DIR }}
        run: npm run lint

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    needs:
      - lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/setup-node-project
        with:
          working-directory: ${{ env.WORK_DIR }}

      - name: Run tests
        working-directory: ${{ env.WORK_DIR }}
        run: npm run test && npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: twospaceships-vitest-report
          path: ${{ env.WORK_DIR }}/html/
          retention-days: 7

      - name: Upload allure results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: twospaceships-allure-results-vitest
          path: ${{ env.WORK_DIR }}/allure-results/
          retention-days: 7

  e2e:
    name: Playwright Tests
    timeout-minutes: 60
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/setup-node-project
        with:
          working-directory: ${{ env.WORK_DIR }}

      - name: Get Playwright version
        id: pw-version
        working-directory: ${{ env.WORK_DIR }}
        run: echo "version=$(npx playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ steps.pw-version.outputs.version }}-chromium

      - name: Install Playwright Browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        working-directory: ${{ env.WORK_DIR }}
        run: npx playwright install chromium

      - name: Install Playwright system deps
        working-directory: ${{ env.WORK_DIR }}
        run: npx playwright install-deps chromium

      - name: Run Playwright tests
        working-directory: ${{ env.WORK_DIR }}
        run: npx playwright test --config=playwright.config.js

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: twospaceships-playwright-report
          path: ${{ env.WORK_DIR }}/playwright-report/
          retention-days: 7

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: twospaceships-allure-results-playwright
          path: ${{ env.WORK_DIR }}/allure-results/
          retention-days: 7
