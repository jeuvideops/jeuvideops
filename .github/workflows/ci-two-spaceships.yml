name: ci-two-spaceships

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  WORK_DIR: TwoSpaceships

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/setup-node-project
        with:
          working-directory: ${{ env.WORK_DIR }}

      - name: Run ESLint with reviewdog
        uses: reviewdog/action-eslint@v1
        with:
          github_token: '${{ github.token }}'
          reporter: ${{ github.event_name == 'pull_request' && 'github-pr-review' || 'github-check' }
          eslint_flags: './src'
          workdir: ${{ env.WORK_DIR }}
          fail_level: 'error'

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    needs:
      - lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/setup-node-project
        with:
          working-directory: ${{ env.WORK_DIR }}

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ steps.pw-version.outputs.version }}-chromium

      - name: Install Playwright Browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        working-directory: ${{ env.WORK_DIR }}
        run: npx playwright install chromium

      - name: Install Playwright system deps
        working-directory: ${{ env.WORK_DIR }}
        run: npx playwright install-deps

      - name: Run Unit & E2E Tests
        working-directory: ${{ env.WORK_DIR }}
        run: npm test

      - name: Write test summary
        if: always()
        working-directory: ${{ env.WORK_DIR }}
        run: |
          {
            echo "## 🧪 TwoSpaceships — Résultats"
            echo ""
            echo "### Unit (Vitest)"
            echo "- Coverage: voir artifact \`twospaceships-coverage\`"
            echo ""
            echo "### E2E (Playwright)"
            echo "- HTML report: voir artifact \`twospaceships-playwright-report\`"
            echo "- Traces/videos : voir artifact \`twospaceships-playwright-artifacts\`"
            echo ""
            echo "### Allure"
            echo "- Results bruts: voir artifact \`twospaceships-allure-results\` (consommé par deploy-dashboard)"
          } >> "$GITHUB_STEP_SUMMARY"
