name: ci-two-spaceships

on:
  workflow_dispatch:
  push:
  pull_request:
    branches:
      - 'main'

jobs:
  audit_job:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: TwoSpaceships
    steps:
      - name: Clone & Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: TwoSpaceships/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Coverage
        run: npm run test:coverage

      - uses: actions/upload-artifact@v7
        id: upload-report
        with:
          name: vitest-report
          path: TwoSpaceships/html/

      - name: Viewer link in summary
        run: echo "[View HTML report](https://viewer.vitest.dev/?url=${{ steps.upload-report.outputs.artifact-url }})" >> $GITHUB_STEP_SUMMARY

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('TwoSpaceships/package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
