name: "[TS] CI"

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches-ignore: [main]
    paths:
      - 'TwoSpaceships/**'
      - '.github/workflows/ci-two-spaceships.yml'
      - '.github/workflows/_ci-game.yml'
      - '.github/actions/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  ci:
    name: "CI Suite"
    uses: ./.github/workflows/_ci-game.yml
    with:
      game-name: TwoSpaceships
      work-dir: TwoSpaceships
      artifact-prefix: twospaceships
    secrets: inherit
