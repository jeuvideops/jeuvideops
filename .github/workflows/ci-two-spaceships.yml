name: "[TS] CI"

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      is-pull-request:
        description: Whether triggered from a PR context (enables PR comments)
        required: false
        type: boolean
        default: false
      pull-request-number:
        description: PR number for comments
        required: false
        type: string
        default: ''
  push:
    branches-ignore: [main]
    paths:
      - 'TwoSpaceships/**'
      - '.github/workflows/ci-two-spaceships.yml'
      - '.github/workflows/_ci-game.yml'
      - '.github/actions/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  ci:
    name: "CI Suite"
    uses: ./.github/workflows/_ci-game.yml
    with:
      game-name: TwoSpaceships
      work-dir: TwoSpaceships
      artifact-prefix: twospaceships
      is-pull-request: ${{ inputs.is-pull-request || false }}
      pull-request-number: ${{ inputs.pull-request-number || '' }}
    secrets: inherit
