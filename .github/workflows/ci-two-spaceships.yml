name: ci-two-spaceships

on:
  workflow_dispatch:
  push:
  pull_request:
    branches:
      - 'main'

jobs:
  audit_job:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: TwoSpaceships
    steps:
      - name: Clone & Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: TwoSpaceships/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Coverage
        run: npm run test:coverage
