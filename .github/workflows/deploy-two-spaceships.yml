name: "[TS] Build & Deploy"

on:
  push:
    branches: [main]
    paths:
      - 'TwoSpaceships/**'
      - '.github/workflows/deploy-two-spaceships.yml'
      - '.github/workflows/_deploy-game.yml'
      - '.github/workflows/_ci-game.yml'
      - '.github/actions/**'
  workflow_dispatch:

concurrency:
  group: deploy-two-spaceships
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  pull-requests: write

jobs:
  deploy:
    uses: ./.github/workflows/_deploy-game.yml
    with:
      game-name: TwoSpaceships
      work-dir: TwoSpaceships
      artifact-prefix: twospaceships
      image-name: twospaceships
      build-cmd: npx gulp build
      build-output-dir: TwoSpaceships/dist/min
      static-artifact-name: ts-site
    secrets: inherit
