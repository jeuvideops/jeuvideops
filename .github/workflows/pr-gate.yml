name: "PR Gate"

on:
  workflow_run: 
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  actions: read
  packages: write

jobs:
  detect-changes:
    name: "Detect changes"
    runs-on: ubuntu-latest
    outputs:
      si: ${{ steps.filter.outputs.si }}
      ts: ${{ steps.filter.outputs.ts }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            si:
              - 'SpaceInvaders/**'
              - '.github/workflows/ci-space-invaders.yml'
              - '.github/workflows/_ci-game.yml'
              - '.github/actions/**'
            ts:
              - 'TwoSpaceships/**'
              - '.github/workflows/ci-two-spaceships.yml'
              - '.github/workflows/_ci-game.yml'
              - '.github/actions/**'

  check-si:
    name: "Check SI — already CI'd?"
    needs: detect-changes
    if: needs.detect-changes.outputs.si == 'true'
    runs-on: ubuntu-latest
    outputs:
      needs-ci: ${{ steps.check.outputs.needs-ci }}
    steps:
      - name: Check if SHA already validated
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ github.event.pull_request.head.sha }}"
          FOUND=$(gh run list \
            --repo "${{ github.repository }}" \
            --workflow="[SI] CI" \
            --status=success \
            --json headSha \
            --limit=50 | jq --arg sha "$SHA" 'map(select(.headSha == $sha)) | length > 0')
          if [ "$FOUND" = "true" ]; then
            echo "needs-ci=false" >> $GITHUB_OUTPUT
            echo "✅ SI: SHA already validated — skipping CI"
          else
            echo "needs-ci=true" >> $GITHUB_OUTPUT
            echo "🔄 SI: SHA not yet validated — CI needed"
          fi

  check-ts:
    name: "Check TS — already CI'd?"
    needs: detect-changes
    if: needs.detect-changes.outputs.ts == 'true'
    runs-on: ubuntu-latest
    outputs:
      needs-ci: ${{ steps.check.outputs.needs-ci }}
    steps:
      - name: Check if SHA already validated
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ github.event.pull_request.head.sha }}"
          FOUND=$(gh run list \
            --repo "${{ github.repository }}" \
            --workflow="[TS] CI" \
            --status=success \
            --json headSha \
            --limit=50 | jq --arg sha "$SHA" 'map(select(.headSha == $sha)) | length > 0')
          if [ "$FOUND" = "true" ]; then
            echo "needs-ci=false" >> $GITHUB_OUTPUT
            echo "✅ TS: SHA already validated — skipping CI"
          else
            echo "needs-ci=true" >> $GITHUB_OUTPUT
            echo "🔄 TS: SHA not yet validated — CI needed"
          fi

  si-ci:
    name: "SI CI (if needed)"
    needs: [detect-changes, check-si]
    if: needs.detect-changes.outputs.si == 'true' && needs.check-si.outputs.needs-ci == 'true'
    uses: ./.github/workflows/ci-space-invaders.yml
    with:
      is-pull-request: true
      pull-request-number: ${{ github.event.pull_request.number }}
    secrets: inherit

  ts-ci:
    name: "TS CI (if needed)"
    needs: [detect-changes, check-ts]
    if: needs.detect-changes.outputs.ts == 'true' && needs.check-ts.outputs.needs-ci == 'true'
    uses: ./.github/workflows/ci-two-spaceships.yml
    with:
      is-pull-request: true
      pull-request-number: ${{ github.event.pull_request.number }}
    secrets: inherit

  gate:
    name: "Gate"
    needs: [detect-changes, check-si, check-ts, si-ci, ts-ci]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate gate
        run: |
          SI="${{ needs.detect-changes.outputs.si }}"
          TS="${{ needs.detect-changes.outputs.ts }}"
          SI_RESULT="${{ needs.si-ci.result }}"
          TS_RESULT="${{ needs.ts-ci.result }}"

          FAIL=false

          if [ "$SI" = "true" ]; then
            case "$SI_RESULT" in
              success) echo "✅ SI: CI passed" ;;
              skipped) echo "✅ SI: already validated by previous run" ;;
              *)        echo "❌ SI: $SI_RESULT"; FAIL=true ;;
            esac
          else
            echo "⏭️  SI: no changes, skipped"
          fi

          if [ "$TS" = "true" ]; then
            case "$TS_RESULT" in
              success) echo "✅ TS: CI passed" ;;
              skipped) echo "✅ TS: already validated by previous run" ;;
              *)        echo "❌ TS: $TS_RESULT"; FAIL=true ;;
            esac
          else
            echo "⏭️  TS: no changes, skipped"
          fi

          [ "$FAIL" = "false" ]
