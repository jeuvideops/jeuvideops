name: "[Central] Deploy Pages"

on:
  workflow_run:
    workflows: ["[SI] CD", "[TS] CD"]
    types: [completed]
    branches: [main]
  push:
    branches: [main]
    paths:
      - '.github/pages/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: "Deploy Pages"
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Create site structure
        run: mkdir -p site/SpaceInvaders site/TwoSpaceships

      - name: Copy central index
        run: cp .github/pages/index.html site/index.html

      # ── SpaceInvaders ────────────────────────────────────────────
      - name: Download SI site (from CD)
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: cd-space-invaders.yml
          branch: main
          workflow_conclusion: success
          name: spaceinvaders-site
          path: site/SpaceInvaders/game

      - name: Download SI allure report (from CI)
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: ci-space-invaders.yml
          workflow_conclusion: success
          name: spaceinvaders-allure-tests-report
          path: site/SpaceInvaders/reports/allure

      - name: Download SI coverage (from CI)
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: ci-space-invaders.yml
          workflow_conclusion: success
          name: spaceinvaders-coverage
          path: site/SpaceInvaders/reports/coverage

      - name: Download SI playwright report (from CI)
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: ci-space-invaders.yml
          workflow_conclusion: success
          name: spaceinvaders-playwright-report
          path: site/SpaceInvaders/reports/playwright

      - name: Download SI audit report (from CI)
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: ci-space-invaders.yml
          workflow_conclusion: success
          name: spaceinvaders-npm-audit-report
          path: site/SpaceInvaders/reports/audit

      # ── TwoSpaceships ─────────────────────────────────────────────
      - name: Download TS site (from CD)
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: cd-two-spaceships.yml
          branch: main
          workflow_conclusion: success
          name: twospaceships-site
          path: site/TwoSpaceships/game

      - name: Download TS allure report (from CI)
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: ci-two-spaceships.yml
          workflow_conclusion: success
          name: twospaceships-allure-tests-report
          path: site/TwoSpaceships/reports/allure

      - name: Download TS coverage (from CI)
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: ci-two-spaceships.yml
          workflow_conclusion: success
          name: twospaceships-coverage
          path: site/TwoSpaceships/reports/coverage

      - name: Download TS playwright report (from CI)
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: ci-two-spaceships.yml
          workflow_conclusion: success
          name: twospaceships-playwright-report
          path: site/TwoSpaceships/reports/playwright

      - name: Download TS audit report (from CI)
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: ci-two-spaceships.yml
          workflow_conclusion: success
          name: twospaceships-npm-audit-report
          path: site/TwoSpaceships/reports/audit

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
