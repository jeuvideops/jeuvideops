name: deploy-dashboard

on:
  workflow_run:
    workflows: ['ci-two-spaceships']
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-dashboard
  cancel-in-progress: true

jobs:
  deploy:
    name: Generate & Deploy Dashboard
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Allure CLI
        run: npm install allure@3

      - name: Download twospaceships allure-results
        uses: actions/download-artifact@v4
        with:
          name: twospaceships-allure-results
          path: TwoSpaceships/allure-results
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Generate TwoSpaceships report
        run: npx allure awesome TwoSpaceships/allure-results --output dashboard --name TwoSpaceships --single-file

      - name: Generate dashboard
        run: npx allure dashboard TwoSpaceships/allure-results --output dashboard --name JeuxVideOPS

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dashboard/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
